apiVersion: v1
kind: Service
metadata:
  name: {{ include "tetris-web.fullname" . }}
  labels:
    {{- include "tetris-web.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tetris-web.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default 8080 }}
      protocol: TCP
      name: http
