{{- if .Values.ingress.enabled  }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{  include "tetris-web.fullname" .  }}
  labels:
    {{- include "tetris-web.labels" . | nindent 4  }}
spec:
  {{- if .Values.ingress.className  }}
  ingressClassName: {{  .Values.ingress.className  }}
  {{- end  }}
  rules:
    {{- range .Values.ingress.hosts  }}
    - host: {{  .host | quote  }}
      http:
        paths:
          {{- range .paths  }}
          - path: {{  .path  }}
            pathType: {{  .pathType  }}
            backend:
              service:
                name: {{  include "tetris-web.fullname" $  }}
                port:
                  number: {{  $.Values.service.port  }}
          {{- end  }}
    {{- end  }}
{{- end  }}
