# {{=<% %>=}}
---
# Default values for tetris-web.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/<% organizationName %>/<% repositoryName %>
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

ingress:
  enabled: false
  className: ""
  hosts:
    - host: tetris.local
      paths:
        - path: /
          pathType: Prefix

app:
  healthPath: /health
